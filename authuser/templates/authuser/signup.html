{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}
<div style="display: flex; flex-direction: column; gap: 10px; width: 50%; margin: auto; background-color: rgb(235, 239, 239); padding: 1.5rem; border-radius: 0.5rem">
    <h2>Sign Up</h2>
<form method="POST" >
    {% csrf_token %}
    {{ form| crispy }}
    <button type="submit" class="btn btn-primary">Sign Up</button>
</form>
<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
